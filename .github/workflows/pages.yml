name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A47A6F: ${{ secrets.A47A6F }}
          BEF996: ${{ secrets.BEF996 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A47A6F', '')
          bm = os.environ.get('BEF996', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- d6673f89f7efd937289a45593b1e00 -->', gm)
          if bm:
              s2 = s2.replace('<!-- daa90df99fb41db85e2e33b831 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
